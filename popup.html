<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Luna'FM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <!-- Use Poppins like the official site -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="text-white overflow-hidden m-0 p-0 select-none">
  <!-- Blurred background exactly like the website -->
  <div class="cover-site">
    <div id="bgCover"></div>
    <div class="bg-mask"></div>
  </div>
  
  <div class="relative z-10 flex flex-col h-full w-full p-4">
    <!-- Album Art Container -->
    <div class="flex justify-center mt-2 mb-4">
      <div class="cover-album relative overflow-hidden flex items-center justify-center">
        <img id="cover-art" src="img/cover.png" alt="Cover Art" class="w-full h-full object-cover" style="display: none;">
        <div id="no-art" class="w-full h-full bg-gray-800 flex items-center justify-center">
          <svg class="w-12 h-12 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
        </div>
      </div>
    </div>

    <!-- Track Info -->
    <div class="info-current-song flex-1 flex flex-col items-center justify-center">
      <h2 id="song-title" class="current-song w-full px-2" title="Chargement...">LUNA'FM</h2>
      <h3 id="song-artist" class="current-artist w-full px-2" title="...">La radio de l'univers</h3>
    </div>

    <!-- Controls -->
    <div class="w-full mt-auto pb-2 flex flex-col gap-4">
      <div class="flex items-center justify-center px-6">
        <button id="play-btn" class="btn-play flex items-center justify-center gap-2">
          <svg id="icon-play" class="w-4 h-4 text-black fill-current" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
          <svg id="icon-pause" class="w-4 h-4 text-black fill-current hidden" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
          <span id="buttonPlay" class="text-black uppercase font-bold tracking-wider">Play</span>
        </button>
      </div>
      
      <!-- Volume Slider -->
      <div class="flex items-center gap-3 px-4">
        <button id="mute-btn" class="text-white hover:text-gray-300 transition-colors focus:outline-none">
          <svg id="icon-vol" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M11 5L6 9H2v6h4l5 4V5z"></path></svg>
          <svg id="icon-mute" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
        </button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="flex-1">
      </div>
    </div>
  </div>
  <audio id="audio-player" preload="none"></audio>
  <script src="popup.js"></script>
</body>
</html>
