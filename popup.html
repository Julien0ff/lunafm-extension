<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Luna'FM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="w-80 bg-gray-900 text-white font-sans overflow-hidden">
  <div class="p-4 flex flex-col gap-4 relative backdrop-blur-md">
    <!-- Header -->
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 flex items-center justify-center shadow-lg">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
      </div>
      <div>
        <h1 class="font-bold text-lg tracking-tight">Luna'FM</h1>
        <p class="text-xs text-purple-300 uppercase tracking-wider" id="status-text">La radio de l'univers</p>
      </div>
    </div>

    <!-- Now Playing -->
    <div class="bg-white/10 rounded-xl p-3 flex items-center gap-3 shadow-inner">
      <img id="cover-art" src="" alt="Cover Art" class="w-16 h-16 rounded-lg object-cover shadow-md bg-gray-800" style="display: none;">
      <div id="no-art" class="w-16 h-16 rounded-lg bg-gray-800 flex items-center justify-center">
        <svg class="w-8 h-8 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
      </div>
      <div class="flex-1 min-w-0">
        <p id="song-title" class="font-bold text-sm truncate w-full" title="Chargement...">Chargement...</p>
        <p id="song-artist" class="text-xs text-gray-400 truncate w-full" title="..."></p>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex items-center justify-between gap-4 px-2">
      <button id="play-btn" class="w-12 h-12 rounded-full bg-purple-600 hover:bg-purple-500 text-white flex items-center justify-center shadow-lg hover:shadow-purple-500/50 transition-all active:scale-95 shrink-0 focus:outline-none">
        <svg id="icon-play" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
        <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
      </button>

      <div class="flex items-center gap-2 flex-1">
        <button id="mute-btn" class="text-gray-400 hover:text-white transition-colors focus:outline-none">
          <svg id="icon-vol" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M11 5L6 9H2v6h4l5 4V5z"></path></svg>
          <svg id="icon-mute" class="w-5 h-5 hidden text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
        </button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="w-full h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer">
      </div>
    </div>
  </div>
  <audio id="audio-player" preload="none"></audio>
  <script src="popup.js"></script>
</body>
</html>
