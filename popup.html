<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Luna'FM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white overflow-hidden relative">
  <!-- Dynamic blurred background -->
  <div class="absolute inset-0 bg-gradient-to-br from-indigo-900 via-purple-900 to-black opacity-80 z-0" id="bg-glow"></div>
  
  <div class="relative z-10 flex flex-col h-full w-full p-6 backdrop-blur-2xl bg-black/40">
    <!-- Header -->
    <div class="flex items-center justify-center mb-6">
      <div class="flex items-center gap-2 bg-white/10 px-4 py-1.5 rounded-full backdrop-blur-md border border-white/10">
        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
        <span class="text-[10px] font-bold tracking-widest uppercase text-white/90">En direct</span>
      </div>
    </div>

    <!-- Album Art -->
    <div class="flex justify-center mb-6 relative">
      <div class="relative w-40 h-40 rounded-2xl overflow-hidden shadow-[0_15px_40px_rgba(147,51,234,0.35)] transition-all duration-500 transform hover:scale-105 group">
        <img id="cover-art" src="" alt="Cover Art" class="w-full h-full object-cover" style="display: none;">
        <div id="no-art" class="w-full h-full bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center">
          <svg class="w-12 h-12 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
        </div>
        <!-- Shine effect -->
        <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
      </div>
    </div>

    <!-- Track Info -->
    <div class="text-center mb-6 flex-1">
      <h2 id="song-title" class="font-bold text-xl text-white truncate mb-1 drop-shadow-md" title="Chargement...">Luna'FM</h2>
      <p id="song-artist" class="text-sm text-purple-300/80 truncate font-light tracking-wide" title="...">La radio de l'univers</p>
    </div>

    <!-- Controls -->
    <div class="flex flex-col gap-4 mt-auto">
      <div class="flex items-center justify-between px-2 gap-4">
        <button id="mute-btn" class="p-2 text-gray-400 hover:text-white transition-colors focus:outline-none rounded-full hover:bg-white/10 shrink-0">
          <svg id="icon-vol" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M11 5L6 9H2v6h4l5 4V5z"></path></svg>
          <svg id="icon-mute" class="w-5 h-5 hidden text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
        </button>

        <button id="play-btn" class="w-14 h-14 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 text-white flex items-center justify-center shadow-[0_4px_20px_rgba(147,51,234,0.4)] hover:shadow-[0_4px_25px_rgba(147,51,234,0.6)] hover:scale-105 transition-all active:scale-95 focus:outline-none shrink-0">
          <svg id="icon-play" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
          <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
        </button>

        <div class="p-2 w-[36px] shrink-0"></div> <!-- spacer for precise centering of play button -->
      </div>
      
      <!-- Volume Slider -->
      <div class="px-2 pb-2">
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="w-full h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer">
      </div>
    </div>
  </div>
  <audio id="audio-player" preload="none"></audio>
  <script src="popup.js"></script>
</body>
</html>
